<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Group Leaderboard — Conestoga GC</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #07331F;
  }
</style>

<body>
<style>
  #gl-root {
    --green: #0B4D32;
    --green-deep: #07331F;
    --green-mid: #135C3D;
    --cream: #F8F3E3;
    --cream-dim: #EFE6CC;
    --paper-line: #E1D5A8;
    --gold: #B8923A;
    --gold-bright: #D4AF53;
    --ink: #1C2B20;
    --ink-soft: #5E6B5F;
    --red: #8C1B23;
    --display-font: Copperplate, 'Copperplate Gothic Light', 'Trajan Pro', Georgia, 'Times New Roman', serif;
    --body-font: Baskerville, 'Baskerville Old Face', 'Big Caslon', Georgia, 'Times New Roman', serif;
    --mono-font: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;

    background: var(--green-deep);
    color: var(--ink);
    font-family: var(--body-font);
    width: 100%;
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    border: none;
  }

  #gl-root * { box-sizing: border-box; }

  .gl-header {
    background: var(--green);
    color: var(--cream);
    padding: 22px 22px 18px;
    position: relative;
    border-bottom: 3px double var(--gold-bright);
  }
  .gl-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .gl-logo {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    border-radius: 50%;
    box-shadow: 0 0 0 2px var(--gold-bright);
  }
  .gl-eyebrow {
    font-family: var(--body-font);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin: 0 0 6px;
  }
  .gl-name {
    font-family: var(--display-font);
    font-weight: 400;
    text-transform: uppercase;
    font-size: clamp(20px, 5vw, 25px);
    margin: 0;
    line-height: 1.3;
    color: var(--cream);
    letter-spacing: 0.06em;
  }
  .gl-team {
    font-size: 12.5px;
    color: var(--cream-dim);
    margin: 6px 0 0;
    opacity: 0.85;
  }

  .gl-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--cream);
    border-bottom: 1px solid var(--paper-line);
  }
  .gl-stat {
    padding: 13px 6px;
    text-align: center;
    border-right: 1px solid var(--paper-line);
  }
  .gl-stat:last-child { border-right: none; }
  .gl-stat-val {
    font-family: var(--mono-font);
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    color: var(--green);
  }
  .gl-stat-label {
    font-size: 9.5px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 3px;
  }

  .gl-section {
    padding: 17px 22px;
    background: var(--cream);
    border-bottom: 1px solid var(--paper-line);
  }
  .gl-section:last-child { border-bottom: none; }
  .gl-section-title {
    font-family: var(--display-font);
    font-weight: 400;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--green);
    margin: 0 0 10px;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--paper-line);
    padding-bottom: 6px;
  }

  .gl-context {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .gl-context b { color: var(--ink); }

  #gl-chart-wrap { position: relative; height: 200px; }

  .gl-table-wrap { overflow-x: auto; }
  table.gl-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono-font);
    font-size: 12px;
    min-width: 520px;
  }
  table.gl-table th {
    text-align: left;
    font-family: var(--body-font);
    font-style: italic;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    padding: 5px 8px;
    border-bottom: 1px solid var(--gold);
  }
  table.gl-table td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--paper-line);
    color: var(--ink);
  }
  table.gl-table tr:last-child td { border-bottom: none; }
  table.gl-table tr:nth-child(even) td { background: rgba(184,146,58,0.08); }
  .gl-mark { display:inline-block; width:9px; height:9px; margin-right:6px; vertical-align:middle; border-radius: 50%; }
  .gl-mark.good { background: var(--red); }
  .gl-mark.rough { background: var(--gold); }

  .gl-legend { font-size: 10.5px; color: var(--ink-soft); margin-top: 9px; font-style: italic; }

  tr.gl-lb-row { cursor: pointer; }
  tr.gl-lb-row:hover td { background: rgba(11,77,50,0.08); }
  tr.gl-lb-row.active td { background: rgba(184,146,58,0.22); }
  tr.gl-lb-row.active td:first-child { box-shadow: inset 3px 0 0 var(--green); }

  .gl-rank {
    font-family: var(--mono-font);
    font-weight: 700;
    color: var(--ink-soft);
  }
  .gl-rank.p1 {
    color: var(--cream);
    background: var(--green);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--gold-bright);
  }
  .gl-rank.p2 { color: var(--ink); font-weight: 800; }
  .gl-rank.p3 { color: var(--gold); font-weight: 800; }

  .gl-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .gl-card {
    background: #fff;
    border: 1px solid var(--paper-line);
    border-top: 3px solid var(--gold);
    border-radius: 3px;
    padding: 12px 13px;
  }
  .gl-card-label {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 0 0 5px;
  }
  .gl-card-name {
    font-family: var(--display-font);
    font-weight: 400;
    text-transform: uppercase;
    font-size: 15px;
    color: var(--green);
    margin: 0;
    line-height: 1.3;
    letter-spacing: 0.03em;
  }
  .gl-card-detail {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 3px 0 0;
  }

  .gl-spot-header {
    padding: 15px 22px;
    background: var(--cream-dim);
    border-bottom: 1px solid var(--paper-line);
    border-left: 4px solid var(--green);
  }
  .gl-spot-name {
    font-family: var(--display-font);
    font-weight: 400;
    text-transform: uppercase;
    font-size: 18px;
    color: var(--green);
    margin: 0;
    letter-spacing: 0.05em;
  }
  .gl-spot-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 3px 0 0;
  }

  .gl-badge {
    display: inline-block;
    font-family: var(--mono-font);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 3px;
    margin-left: 5px;
  }
  .gl-badge.birdie { background: rgba(184,146,58,0.18); color: var(--gold); }
  .gl-badge.eagle { background: rgba(140,27,35,0.14); color: var(--red); }

  .gl-empty {
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    padding: 30px 22px;
  }

  .gl-asof {
    font-size: 10.5px;
    color: var(--cream-dim);
    text-align: right;
    padding: 12px 22px;
    background: var(--green-deep);
    font-style: italic;
  }

  @media (max-width: 480px) {
    .gl-header { padding: 18px 14px 14px; }
    .gl-section { padding: 14px 14px; }
    .gl-spot-header { padding: 13px 14px; }
    .gl-asof { padding: 10px 14px; }

    .gl-name { font-size: 19px; letter-spacing: 0.03em; }
    .gl-spot-name { font-size: 16px; }
    .gl-section-title { font-size: 12px; }
    .gl-logo { width: 42px; height: 42px; }

    .gl-stats { grid-template-columns: repeat(2, 1fr); }
    .gl-stat { padding: 10px 4px; border-bottom: 1px solid var(--paper-line); }
    .gl-stat:nth-child(even) { border-right: none; }
    .gl-stat:nth-child(-n+2) { border-bottom: 1px solid var(--paper-line); }
    .gl-stat:nth-last-child(-n+2) { border-bottom: none; }
    .gl-stat-val { font-size: 15px; }

    .gl-cards { grid-template-columns: 1fr; gap: 8px; }
    .gl-card { padding: 10px 11px; }

    table.gl-table { font-size: 11px; min-width: 460px; }
    table.gl-table th, table.gl-table td { padding: 6px 6px; }

    .gl-context, .gl-legend { font-size: 11.5px; }
  }
</style>

  <div id="gl-content"></div>
</div>

  const DATA_AS_OF = "June 30, 2026";
  const root = document.getElementById('gl-content');
  let chartInstance = null;
  let currentSearch = 'Chominiec';

  function fmt(n) { return (n === null || n === undefined) ? '–' : n; }

  function toParStr(v) {
    if (v === null || v === undefined) return '–';
    if (v === 0) return 'E';
    return v > 0 ? `+${v}` : `${v}`;
  }

  function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }

  function stdev(arr) {
    if (arr.length < 2) return null;
    const m = avg(arr);
    const variance = arr.reduce((sum, v) => sum + (v - m) * (v - m), 0) / (arr.length - 1);
    return Math.sqrt(variance);
  }

  function findPlayer(term) {
    const t = term.trim().toLowerCase();
    if (!t) return null;
    const players = LEAGUE_DATA.players || {};
    for (const id in players) {
      const p = players[id];
      if ((p.name || '').toLowerCase().includes(t)) return { id, ...p };
    }
    return null;
  }

  function buildRank(playerId) {
    const list = LEAGUE_DATA.rankList || [];
    const idx = list.findIndex((c) => String(c.id) === String(playerId));
    if (idx === -1) return null;
    return {
      rank: idx + 1,
      total: list.length,
      points: list[idx].points,
      above: idx > 0 ? list[idx - 1] : null,
      below: idx < list.length - 1 ? list[idx + 1] : null,
    };
  }

  function expandRounds(player) {
    return (player.rounds || []).map((r) => ({
      week: r.w, date: r.d, gross: r.g, net: r.n, points: r.p,
      par: r.par, nineName: r.nine, index: r.idx,
      toPar: (r.par !== null && r.par !== undefined) ? r.g - r.par : null,
      birdies: r.bird || 0, eagles: r.eag || 0,
    }));
  }

  function computeGroupStats() {
    const players = LEAGUE_DATA.players || {};
    return Object.keys(players).map((id) => {
      const p = players[id];
      const rounds = expandRounds(p);
      const netVals = rounds.map((r) => r.net);
      const toParVals = rounds.map((r) => r.toPar).filter((v) => v !== null && v !== undefined);
      const avgNet = avg(netVals);
      const avgToPar = avg(toParVals);
      const sdToPar = stdev(toParVals);
      const bestRound = rounds.reduce((best, r) => (r.toPar !== null && r.toPar !== undefined && (!best || r.toPar < best.toPar) ? r : best), null);
      const totalBirdies = rounds.reduce((s, r) => s + (r.birdies || 0), 0);
      const totalEagles = rounds.reduce((s, r) => s + (r.eagles || 0), 0);
      let trendDelta = null;
      if (rounds.length >= 4) {
        const half = Math.ceil(rounds.length / 2);
        const first = rounds.slice(0, half).map((r) => r.toPar).filter((v) => v !== null && v !== undefined);
        const second = rounds.slice(half).map((r) => r.toPar).filter((v) => v !== null && v !== undefined);
        if (first.length && second.length) trendDelta = avg(second) - avg(first);
      }
      const rank = buildRank(id);
      return {
        id, name: p.name, team: p.team, handicap: p.handicap,
        points: rank ? rank.points : p.points,
        roundsPlayed: rounds.length, avgNet, avgToPar, sdToPar, bestRound, trendDelta, rounds,
        totalBirdies, totalEagles,
      };
    });
  }

  function renderLeaderboardRows(stats) {
    const sorted = stats.slice().sort((a, b) => {
      if (b.points !== a.points) return b.points - a.points;
      if (a.avgToPar === null) return 1;
      if (b.avgToPar === null) return -1;
      return a.avgToPar - b.avgToPar;
    });
    return sorted.map((s, i) => {
      const rankNum = i + 1;
      const active = (s.name.toLowerCase().includes(currentSearch.toLowerCase()));
      const podiumClass = rankNum === 1 ? ' p1' : rankNum === 2 ? ' p2' : rankNum === 3 ? ' p3' : '';
      return `
        <tr class="gl-lb-row${active ? ' active' : ''}" data-id="${s.id}">
          <td class="gl-rank${podiumClass}">P${rankNum}</td>
          <td>${s.name}</td>
          <td>${fmt(s.handicap)}</td>
          <td>${s.roundsPlayed}</td>
          <td>${s.avgNet !== null ? s.avgNet.toFixed(1) : '–'}</td>
          <td>${s.avgToPar !== null ? toParStr(Math.round(s.avgToPar * 10) / 10) : '–'}</td>
          <td>${s.totalBirdies}${s.totalEagles ? ' / ' + s.totalEagles : ''}</td>
          <td>${s.points}</td>
        </tr>
      `;
    }).join('');
  }

  function renderHighlightCards(stats) {
    const withBest = stats.filter((s) => s.bestRound);
    const lowRound = withBest.length
      ? withBest.reduce((b, s) => (s.bestRound.toPar < b.bestRound.toPar ? s : b))
      : null;

    const improvable = stats.filter((s) => s.trendDelta !== null);
    const mostImproved = improvable.length
      ? improvable.reduce((b, s) => (s.trendDelta < b.trendDelta ? s : b))
      : null;

    const steadyPool = stats.filter((s) => s.sdToPar !== null && s.roundsPlayed >= 3);
    const steadiest = steadyPool.length
      ? steadyPool.reduce((b, s) => (s.sdToPar < b.sdToPar ? s : b))
      : null;

    const mostActive = stats.length
      ? stats.reduce((b, s) => (s.roundsPlayed > b.roundsPlayed ? s : b))
      : null;

    const birdieKing = stats.some((s) => s.totalBirdies > 0)
      ? stats.reduce((b, s) => (s.totalBirdies > b.totalBirdies ? s : b))
      : null;

    const eagleHitters = stats.filter((s) => s.totalEagles > 0);

    const cards = [];
    if (lowRound) {
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Low round of the group</p>
          <p class="gl-card-name">${lowRound.name}</p>
          <p class="gl-card-detail">${toParStr(lowRound.bestRound.toPar)} on the ${lowRound.bestRound.nineName || 'course'}, Week ${lowRound.bestRound.week}</p>
        </div>
      `);
    }
    if (mostActive) {
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Most rounds logged</p>
          <p class="gl-card-name">${mostActive.name}</p>
          <p class="gl-card-detail">${mostActive.roundsPlayed} rounds so far</p>
        </div>
      `);
    }
    if (steadiest) {
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Steadiest game</p>
          <p class="gl-card-name">${steadiest.name}</p>
          <p class="gl-card-detail">±${steadiest.sdToPar.toFixed(1)} strokes round to round</p>
        </div>
      `);
    }
    if (mostImproved) {
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Trending down (improving)</p>
          <p class="gl-card-name">${mostImproved.name}</p>
          <p class="gl-card-detail">${toParStr(Math.round(mostImproved.trendDelta * 10) / 10)} vs their early rounds</p>
        </div>
      `);
    }
    if (birdieKing) {
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Most birdies</p>
          <p class="gl-card-name">${birdieKing.name}</p>
          <p class="gl-card-detail">${birdieKing.totalBirdies} birdie${birdieKing.totalBirdies === 1 ? '' : 's'} this season</p>
        </div>
      `);
    }
    if (eagleHitters.length) {
      const names = eagleHitters.map((s) => `${s.name} (${s.totalEagles})`).join(', ');
      cards.push(`
        <div class="gl-card">
          <p class="gl-card-label">Eagles</p>
          <p class="gl-card-name">${eagleHitters.length === 1 ? eagleHitters[0].name : eagleHitters.length + ' golfers'}</p>
          <p class="gl-card-detail">${names}</p>
        </div>
      `);
    }
    return cards.join('');
  }

  function renderSpotlight(player) {
    const rounds = expandRounds(player);
    const rank = buildRank(player.id);
    const avgNet = avg(rounds.map((r) => r.net));
    const toParVals = rounds.map((r) => r.toPar).filter((v) => v !== null && v !== undefined);
    const avgToPar = avg(toParVals);
    const bestRound = rounds.reduce((best, r) => (r.toPar !== null && r.toPar !== undefined && (!best || r.toPar < best.toPar) ? r : best), null);
    const lastRound = rounds.length ? rounds[rounds.length - 1] : null;
    const totalBirdies = rounds.reduce((s, r) => s + (r.birdies || 0), 0);
    const totalEagles = rounds.reduce((s, r) => s + (r.eagles || 0), 0);

    return `
      <div class="gl-spot-header">
        <p class="gl-eyebrow">Spotlight</p>
        <h3 class="gl-spot-name">${player.name}</h3>
        <p class="gl-spot-sub">${player.team ? player.team + ' · ' : ''}Handicap ${fmt(player.handicap)}</p>
      </div>

      <div class="gl-stats">
        <div class="gl-stat"><div class="gl-stat-val">${rounds.length}</div><div class="gl-stat-label">Rounds</div></div>
        <div class="gl-stat"><div class="gl-stat-val">${avgNet !== null ? avgNet.toFixed(1) : '–'}</div><div class="gl-stat-label">Avg Net</div></div>
        <div class="gl-stat"><div class="gl-stat-val">${avgToPar !== null ? toParStr(Math.round(avgToPar * 10) / 10) : '–'}</div><div class="gl-stat-label">Avg to Par</div></div>
        <div class="gl-stat"><div class="gl-stat-val">${rank ? rank.points : fmt(player.points)}</div><div class="gl-stat-label">League Pts</div></div>
      </div>

      <div class="gl-section">
        <p class="gl-section-title">Standing (full league, ${rank ? rank.total : '–'} players)</p>
        <p class="gl-context">
          ${rank ? `<b>${rank.rank}</b> of <b>${rank.total}</b> in the order of merit, with <b>${rank.points}</b> points.` : 'No order-of-merit data available.'}
          ${rank && rank.above ? `<br>Just ahead: <b>${rank.above.name}</b> (${rank.above.points} pts).` : ''}
          ${rank && rank.below ? `<br>Right behind: <b>${rank.below.name}</b> (${rank.below.points} pts).` : ''}
        </p>
      </div>

      <div class="gl-section">
        <p class="gl-section-title">Score trend</p>
        <div id="gl-chart-wrap"><canvas id="gl-chart"></canvas></div>
      </div>

      <div class="gl-section">
        <p class="gl-section-title">Round by round</p>
        <div class="gl-table-wrap">
          <table class="gl-table">
            <thead><tr><th></th><th>Wk</th><th>Date</th><th>Nine</th><th>Score</th><th>Net</th><th>Pts</th></tr></thead>
            <tbody>
              ${rounds.slice().reverse().map((r) => `
                <tr>
                  <td><span class="gl-mark ${avgToPar !== null && r.toPar !== null && r.toPar <= avgToPar ? 'good' : 'rough'}"></span></td>
                  <td>${r.week}</td>
                  <td>${r.date}</td>
                  <td>${r.nineName ? r.nineName : '–'}</td>
                  <td>${r.gross}${r.par !== null && r.par !== undefined ? ` (${toParStr(r.toPar)})` : ''}${r.birdies ? `<span class="gl-badge birdie">${r.birdies} bird${r.birdies > 1 ? 's' : ''}</span>` : ''}${r.eagles ? `<span class="gl-badge eagle">${r.eagles} eagle${r.eagles > 1 ? 's' : ''}</span>` : ''}</td>
                  <td>${r.net}</td>
                  <td>${r.points}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
        <p class="gl-legend"><span class="gl-mark good"></span>at or below this player's average to par &nbsp; <span class="gl-mark rough"></span>above it</p>
        ${(totalBirdies || totalEagles) ? `<p class="gl-context" style="margin-top:6px;">${totalBirdies} birdie${totalBirdies === 1 ? '' : 's'}${totalEagles ? `, ${totalEagles} eagle${totalEagles === 1 ? '' : 's'}` : ''} this season.</p>` : ''}
        ${lastRound ? `<p class="gl-context" style="margin-top:10px;">Most recent: Week ${lastRound.week} on ${lastRound.date} — shot ${lastRound.gross}${lastRound.par !== null && lastRound.par !== undefined ? ` (${toParStr(lastRound.toPar)})` : ''} gross${lastRound.nineName ? ` on the ${lastRound.nineName} nine` : ''}, ${lastRound.net} net, for ${lastRound.points} pt${lastRound.points === 1 ? '' : 's'}.</p>` : ''}
        ${bestRound && bestRound.par !== null && bestRound.par !== undefined ? `<p class="gl-context">Best round: Week ${bestRound.week}, ${toParStr(bestRound.toPar)} on the ${bestRound.nineName || 'course'}.</p>` : ''}
      </div>
    `;
  }

  function render() {
    const stats = computeGroupStats();
    const player = findPlayer(currentSearch);

    root.innerHTML = `
      <div class="gl-header">
        <div class="gl-header-row">
          <div>
            <p class="gl-eyebrow">${LEAGUE_DATA.leagueName || ''}</p>
            <h2 class="gl-name">Group Leaderboard</h2>
            <p class="gl-team">${Object.keys(LEAGUE_DATA.players || {}).length} players · ${LEAGUE_DATA.seasonSummary || ''}</p>
          </div>
          <img class="gl-logo" src="${LOGO_SRC}" alt="Conestoga GC logo" />
        </div>
      </div>

      <div class="gl-section">
        <p class="gl-section-title">Standings</p>
        <div class="gl-table-wrap">
          <table class="gl-table">
            <thead><tr><th>#</th><th>Name</th><th>HCP</th><th>Rds</th><th>Avg Net</th><th>Avg to Par</th><th>Bird/Eag</th><th>Pts</th></tr></thead>
            <tbody>${renderLeaderboardRows(stats)}</tbody>
          </table>
        </div>
        <p class="gl-legend">Tap a row to see that player's full breakdown below. Ranked by league points, then average to par. Bird/Eag = total birdies, then eagles, for the season.</p>
      </div>

      <div class="gl-section">
        <p class="gl-section-title">Highlights</p>
        <div class="gl-cards">${renderHighlightCards(stats)}</div>
      </div>

      ${player ? renderSpotlight(player) : `<div class="gl-empty">No player found matching "<b>${currentSearch}</b>".</div>`}

      <div class="gl-asof">Data as of ${DATA_AS_OF} · ${LEAGUE_DATA.seasonSummary || ''}</div>
    `;

    root.querySelectorAll('.gl-lb-row').forEach((row) => {
      row.addEventListener('click', () => {
        const id = row.getAttribute('data-id');
        currentSearch = LEAGUE_DATA.players[id].name;
        render();
      });
    });

    if (player) drawChart(expandRounds(player));
  }

  function drawChart(rounds) {
    const ctx = document.getElementById('gl-chart');
    if (!ctx || rounds.length === 0) return;
    if (chartInstance) chartInstance.destroy();
    const labels = rounds.map((r) => 'Wk ' + r.week);
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Par',
            data: rounds.map((r) => r.par),
            borderColor: '#B8923A',
            borderDash: [4, 4],
            backgroundColor: 'transparent',
            tension: 0,
            pointRadius: 0,
            borderWidth: 1,
          },
          {
            label: 'Gross',
            data: rounds.map((r) => r.gross),
            borderColor: '#0B4D32',
            backgroundColor: 'transparent',
            tension: 0.25,
            pointRadius: 3,
            pointBackgroundColor: '#0B4D32',
          },
          {
            label: 'Net',
            data: rounds.map((r) => r.net),
            borderColor: '#8C1B23',
            backgroundColor: 'transparent',
            tension: 0.25,
            pointRadius: 3,
            pointBackgroundColor: '#8C1B23',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#1C2B20', font: { size: 11 } } },
        },
        scales: {
          x: { ticks: { color: '#5E6B5F', font: { size: 10 } }, grid: { color: '#E1D5A8' } },
          y: { ticks: { color: '#5E6B5F', font: { size: 10 } }, grid: { color: '#E1D5A8' } },
        },
      },
    });
  }

  render();
})();
</script>
</body>
</html>
